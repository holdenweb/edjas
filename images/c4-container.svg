<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="790" viewBox="0 0 1040 790" role="img" aria-label="C4 container diagram for EDJAS">
  <title>EDJAS — C4 Container Diagram</title>
  <desc>Level 2 C4 diagram. An analyst authors a TOML spec and runs the edjas CLI, which calls the EDJAS library; the library reads the spec and the spreadsheet workbook via openpyxl, and the CLI emits JSON for a downstream system.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c959f"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .title { font-size: 22px; font-weight: 700; fill: #1f2328; }
      .subtitle { font-size: 13px; fill: #656d76; }
      .person { fill: #08427b; }
      .container { fill: #1168bd; }
      .store { fill: #438dd5; }
      .ext { fill: #8b949e; }
      .boundary { fill: none; stroke: #6b7681; stroke-width: 1.6; stroke-dasharray: 7 5; }
      .bname { fill: #57606a; font-size: 12px; font-weight: 600; }
      .hdr { fill: #ffffff; font-size: 15px; font-weight: 700; }
      .tag { fill: #cfe3f5; font-size: 11px; }
      .tag-e { fill: #eaeef2; font-size: 11px; }
      .desc { fill: #e8f1fa; font-size: 11.5px; }
      .desc-e { fill: #f4f6f8; font-size: 11.5px; }
      .edge { stroke: #8c959f; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .elabel { fill: #57606a; font-size: 10.5px; }
      .note { fill: #656d76; font-size: 11px; }
    </style>
  </defs>

  <rect width="1040" height="790" fill="#ffffff"/>
  <text class="title" x="40" y="44">EDJAS — C4 Container Diagram</text>
  <text class="subtitle" x="40" y="66">Level 2: how a person, the files, and the runtime pieces fit together</text>

  <!-- person -->
  <circle class="person" cx="500" cy="112" r="17"/>
  <rect class="person" x="390" y="132" width="220" height="78" rx="8"/>
  <text class="hdr" x="500" y="158" text-anchor="middle">Analyst / integrator</text>
  <text class="tag" x="500" y="176" text-anchor="middle">[Person]</text>
  <text class="desc" x="500" y="196" text-anchor="middle">Authors specs, runs extractions</text>

  <!-- system boundary -->
  <rect class="boundary" x="310" y="262" width="380" height="330" rx="12"/>
  <text class="bname" x="322" y="284">EDJAS   [Software System]</text>

  <!-- CLI container -->
  <rect class="container" x="350" y="312" width="300" height="110" rx="8"/>
  <text class="hdr" x="366" y="342">edjas CLI</text>
  <text class="tag" x="366" y="362">[Container: Python console script]</text>
  <text class="desc" x="366" y="384">Parses arguments, serialises the</text>
  <text class="desc" x="366" y="402">result to JSON on stdout</text>

  <!-- library container -->
  <rect class="container" x="350" y="452" width="300" height="110" rx="8"/>
  <text class="hdr" x="366" y="482">EDJAS library</text>
  <text class="tag" x="366" y="502">[Container: Python package]</text>
  <text class="desc" x="366" y="524">Loads the spec, evaluates each</text>
  <text class="desc" x="366" y="542">expression, reads the workbook</text>

  <!-- spec file -->
  <rect class="store" x="40" y="452" width="210" height="110" rx="8"/>
  <text class="hdr" x="56" y="482">Extraction spec</text>
  <text class="tag" x="56" y="502">[File: TOML]</text>
  <text class="desc" x="56" y="524">Version-controlled; names</text>
  <text class="desc" x="56" y="542">what to extract</text>

  <!-- workbook -->
  <rect class="store" x="750" y="452" width="210" height="110" rx="8"/>
  <text class="hdr" x="766" y="482">Spreadsheet workbook</text>
  <text class="tag" x="766" y="502">[File: .xlsx]</text>
  <text class="desc" x="766" y="524">Read-only; never</text>
  <text class="desc" x="766" y="542">modified by EDJAS</text>

  <!-- openpyxl, directly below the library -->
  <rect class="ext" x="390" y="652" width="220" height="96" rx="8"/>
  <text class="hdr" x="406" y="680">openpyxl</text>
  <text class="tag-e" x="406" y="700">[External library]</text>
  <text class="desc-e" x="406" y="722">Reads cells and named ranges</text>

  <!-- downstream -->
  <rect class="ext" x="760" y="652" width="210" height="96" rx="8"/>
  <text class="hdr" x="776" y="680">Downstream system</text>
  <text class="tag-e" x="776" y="700">[External]</text>
  <text class="desc-e" x="776" y="722">Consumes the JSON</text>

  <!-- edges -->
  <path class="edge" d="M500,210 L500,308"/>
  <text class="elabel" x="512" y="248">runs  edjas data.xlsx report.toml</text>

  <path class="edge" d="M388,168 C220,180 145,300 145,448"/>
  <text class="elabel" x="162" y="318">authors, version-controls</text>

  <path class="edge" d="M500,422 L500,448"/>
  <text class="elabel" x="512" y="440">read_spec(xlsx, spec)</text>

  <path class="edge" d="M348,507 L254,507"/>
  <text class="elabel" x="298" y="499" text-anchor="end">reads</text>

  <path class="edge" d="M652,507 L746,507"/>
  <text class="elabel" x="702" y="499">reads</text>

  <path class="edge" d="M500,562 L500,648"/>
  <text class="elabel" x="512" y="610">uses</text>

  <path class="edge" d="M652,330 C850,318 1000,352 1000,600 C1000,642 948,652 872,655"/>
  <text class="elabel" x="936" y="404" text-anchor="end">JSON to stdout</text>

  <!-- notes -->
  <text class="note" x="40" y="778">Dark blue = person · blue = EDJAS containers · light blue = files EDJAS reads · grey = external dependencies. Nothing ever writes to the workbook.</text>
</svg>
